<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="manifest.json" />
    <title>Trash Finder</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 15px;
        background: #eee;
      }
      .box {
        background: #fff;
        padding: 15px;
        border-radius: 5px;
        max-width: 300px;
        margin: auto;
        border: 1px solid #ccc;
      }
      .map {
        background: #d1e7dd;
        height: 150px;
        position: relative;
        margin-bottom: 10px;
        border: 1px solid #bbb;
      }
      .u {
        width: 8px;
        height: 8px;
        background: blue;
        border-radius: 50%;
        position: absolute;
        top: 50%;
        left: 50%;
      }
      .btn {
        width: 100%;
        padding: 10px;
        background: #198754;
        color: #fff;
        border: none;
        cursor: pointer;
      }
      .row {
        display: flex;
        justify-content: space-between;
        padding: 5px 0;
        border-bottom: 1px solid #eee;
        font-size: 13px;
      }
      .btn-e {
        color: blue;
        cursor: pointer;
        margin-right: 8px;
      }
      .btn-d {
        color: red;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h4>Trash Finder App</h4>
      <div class="map">
        <div class="u"></div>
        <span style="position: absolute; top: 10%; left: 20%">🗑️</span>
        <span style="position: absolute; bottom: 15%; right: 25%">🗑️</span>
      </div>

      <button class="btn" onclick="add()">Find & Log Bin</button>

      <div id="out" style="margin-top: 15px">
        <b>Logs:</b>
        <div id="list"></div>
      </div>
    </div>

    <script>
      let div = document.getElementById("list");
      let b = ["Gate 1", "2nd Floor", "Food Court", "Canteen", "Bus Stop"];

      function get() {
        let v = JSON.parse(localStorage.getItem("bins")) || [];
        div.innerHTML = "";
        v.forEach((item, i) => {
          div.innerHTML += `
                <div class="row">
                    <span>${item.n} (${item.t})</span>
                    <div>
                        <span class="btn-e" onclick="upd(${i})">Edit</span>
                        <span class="btn-d" onclick="del(${i})">X</span>
                    </div>
                </div>`;
        });
      }

      function add() {
        let v = JSON.parse(localStorage.getItem("bins")) || [];
        let n = b[Math.floor(Math.random() * b.length)];
        v.push({ n: n, t: new Date().toLocaleTimeString() });
        localStorage.setItem("bins", JSON.stringify(v));
        alert("Found: " + n);
        get();
      }

      function upd(i) {
        let v = JSON.parse(localStorage.getItem("bins"));
        let r = prompt("Change name:", v[i].n);
        if (r) {
          v[i].n = r;
          localStorage.setItem("bins", JSON.stringify(v));
          get();
        }
      }

      function del(i) {
        let v = JSON.parse(localStorage.getItem("bins"));
        v.splice(i, 1);
        localStorage.setItem("bins", JSON.stringify(v));
        get();
      }

      get();

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("/service-worker.js")
          .then(() => {
            console.log("ayos! rehistro as service worker");
          })
          .catch((error) => {
            console.log("Registration failed: ", error);
          });
      }
    </script>
  </body>
</html>
